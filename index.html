    function getLevenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        matrix[i][j - 1] + 1,
                        matrix[i - 1][j] + 1
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    function cleanString(str, language = "en") {
        let cleaned = str.trim().toLowerCase().replace(/\s+/g, ' ');
        if (language === "vi") {
            cleaned = cleaned.replace(/^(sự|việc|cuộc|cái|đang|những)\s+/g, '');
        }
        return cleaned;
    }

            textLabel.innerHTML = "<span class='empty-pool-msg'>Unit này chưa được thêm dữ liệu từ vựng!</span>";
            document.getElementById("user-input").disabled = true;
            return;
        }

        document.getElementById("result-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("submit-btn").style.display = "inline-block";
        
        const inputField = document.getElementById("user-input");
        inputField.value = "";
        inputField.disabled = false;
        inputField.focus();

        const randomIndex = Math.floor(Math.random() * activePool.length);
        currentItem = activePool[randomIndex];

        questionDirection = Math.random() < 0.5 ? "en_to_vi" : "vi_to_en";

        if (questionDirection === "en_to_vi") {
            typeLabel.innerText = "Hãy Dịch Từ Này Sang Tiếng Việt:";
            textLabel.innerText = currentItem.en;
        } else {
            typeLabel.innerText = "Hãy Dịch Từ Này Sang Tiếng Anh:";
            textLabel.innerText = currentItem.vi;
        }
    }

    function checkAnswer() {
        if (activePool.length === 0) return;

        const rawInput = document.getElementById("user-input").value;
        if (rawInput.trim() === "") {
            alert("Vui lòng nhập câu trả lời trước nhé!");
            return;
        }

        totalCount++;
        document.getElementById("score-total").innerText = totalCount;

        const lang = (questionDirection === "en_to_vi") ? "vi" : "en";
        const targetWord = (questionDirection === "en_to_vi") ? currentItem.vi : currentItem.en;
        
        const cleanUser = cleanString(rawInput, lang);
        const cleanTarget = cleanString(targetWord, lang);

        const distance = getLevenshteinDistance(cleanUser, cleanTarget);
        const allowedErrorThreshold = Math.max(1, Math.round(cleanTarget.length * 0.2));

        let status = "wrong"; 

        if (cleanUser === cleanTarget) {
            status = "exact";
        } else if (distance <= allowedErrorThreshold) {
            status = "near";
        }

        const resultBox = document.getElementById("result-box");
        const resultMessage = document.getElementById("result-message");
        const examplesList = document.getElementById("examples-list");

        document.getElementById("user-input").disabled = true;
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";

        if (status === "exact") {
            correctCount++;
            resultBox.className = "result-box success";
            resultMessage.innerHTML = "🎉 Hoàn Toàn Chính Xác! Xuất Sắc!";
        } else if (status === "near") {
            correctCount++; 
            resultBox.className = "result-box warning";
            resultMessage.innerHTML = `👍 Gần Chính Xác! Bạn gõ nhầm một chút. Đáp án chuẩn là: <strong>${targetWord}</strong>`;
        } else {
            resultBox.className = "result-box error";
            resultMessage.innerHTML = `❌ Chưa Chính Xác Rồi! Đáp án chính xác là: <strong>${targetWord}</strong>`;
        }

        document.getElementById("score-correct").innerText = correctCount;

        examplesList.innerHTML = "";
        if (currentItem.examples && currentItem.examples.length > 0) {
            currentItem.examples.forEach(ex => {
                const item = document.createElement("div");
                item.className = "example-item";
                item.innerHTML = `<span class="example-en">• ${ex.en}</span> <br> <span class="example-vi">(${ex.vi})</span>`;
                examplesList.appendChild(item);
            });
            document.getElementById("examples-box").style.display = "block";
        } else {
            document.getElementById("examples-box").style.display = "none";
        }

        resultBox.style.display = "block";
        document.getElementById("next-btn").focus();
    }

    window.onload = changeUnit;
</script>
</body>
</html>
